# CJK-optimized overrides -- larger fonts for Chinese readability
name: cjk
extends: default
fonts:
  sans_serif: ["Noto Sans CJK SC", "TeX Gyre Heros", "Arial", "sans-serif"]
rcparams:
  font.size: 11
  axes.titlesize: 12
  axes.labelsize: 10
  xtick.labelsize: 9
  ytick.labelsize: 9
chart_defaults:
  title_fontsize: 11
  subtitle_fontsize: 8
  source_fontsize: 7
